name: Blutter - Flutter APK Reverse Engineering

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct download URL to APK file'
        required: true
        type: string

jobs:
  blutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ git unzip wget
          pip install --upgrade pip

      - name: Clone Blutter
        run: |
          git clone https://github.com/aspect-apps/blutter.git blutter_repo
          cd blutter_repo
          pip install -r requirements.txt

      - name: Download APK
        run: |
          mkdir -p apk_input
          wget -q --show-progress -O apk_input/target.apk "${{ github.event.inputs.apk_url }}"
          ls -lh apk_input/
          file apk_input/target.apk

      - name: Run Blutter
        run: |
          cd blutter_repo
          python blutter.py ../apk_input --output ../blutter_output

      - name: List output
        run: |
          echo "=== Blutter Output ==="
          find blutter_output/ -type f | head -50
          echo "---"
          if [ -f blutter_output/pp.txt ]; then
            echo "=== Assembly preview (first 100 lines) ==="
            head -100 blutter_output/pp.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: blutter-output
          path: blutter_output/
          retention-days: 30
