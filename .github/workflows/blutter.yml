name: Blutter - Flutter APK Reverse Engineering

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct download URL to APK file'
        required: true
        type: string

jobs:
  blutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build g++ git unzip wget python3-pip

      - name: Clone Blutter
        run: |
          git clone --depth 1 https://github.com/worawit/blutter.git blutter_repo

      - name: Download APK
        run: |
          mkdir -p apk_input
          wget -q --show-progress -O apk_input/target.apk "${{ github.event.inputs.apk_url }}"
          ls -lh apk_input/
          file apk_input/target.apk

      - name: Extract libs from APK
        run: |
          cd apk_input
          unzip -o target.apk "lib/*/libapp.so" "lib/*/libflutter.so" -d extracted 2>/dev/null || true
          # Copy libapp.so (any arch)
          find extracted -name "libapp.so" -exec cp {} . \;
          # Copy libflutter.so (any arch)
          find extracted -name "libflutter.so" -exec cp {} . \;
          echo "=== Extracted files ==="
          ls -lh libapp.so libflutter.so 2>/dev/null || echo "Missing files!"
          echo "=== All .so in APK ==="
          find extracted -name "*.so" 2>/dev/null | head -20

      - name: Run Blutter
        run: |
          cd blutter_repo
          python blutter.py ../apk_input ../blutter_output

      - name: List output
        run: |
          echo "=== Blutter Output ==="
          find blutter_output/ -type f 2>/dev/null | head -50
          echo "---"
          if [ -f blutter_output/pp.txt ]; then
            echo "=== Assembly preview (first 200 lines) ==="
            head -200 blutter_output/pp.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: blutter-output
          path: blutter_output/
          retention-days: 30
